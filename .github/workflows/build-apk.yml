name: Build APK

on:
  push:
    branches:
      - main
      - "claude/**"
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run build_runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build release APK (split per ABI)
        run: flutter build apk --release --split-per-abi

      - name: List APK sizes
        run: |
          echo "=== APK sizes ==="
          find build/app/outputs/flutter-apk -name "*.apk" -exec du -h {} \;

      - name: Upload APKs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 7

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: Reverse Sing Challenge v1.0.0
          body: |
            Offline party game — record your voice, reverse it, pass the phone, reveal the chaos.

            Install the APK that matches your device:
            - **app-arm64-v8a-release.apk** — most modern Android phones (2017+)
            - **app-armeabi-v7a-release.apk** — older 32-bit Android devices
            - **app-x86_64-release.apk** — Android emulators / x86 tablets

            Requires Android 9 (API 28) or higher.
          files: build/app/outputs/flutter-apk/*.apk
          draft: false
          prerelease: false
